<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- REALM Ag Marketplace favicon — wheat stalk on brand green -->
  <rect width="32" height="32" rx="8" fill="#7a9228"/>
  <!-- Stalk -->
  <line x1="16" y1="26" x2="16" y2="8" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Left grain heads -->
  <ellipse cx="12" cy="12" rx="3" ry="2" fill="white" transform="rotate(-30 12 12)"/>
  <ellipse cx="11" cy="17" rx="3" ry="2" fill="white" transform="rotate(-20 11 17)"/>
  <!-- Right grain heads -->
  <ellipse cx="20" cy="12" rx="3" ry="2" fill="white" transform="rotate(30 20 12)"/>
  <ellipse cx="21" cy="17" rx="3" ry="2" fill="white" transform="rotate(20 21 17)"/>
  <!-- Top grain head -->
  <ellipse cx="16" cy="9" rx="2" ry="3" fill="white"/>
</svg>
